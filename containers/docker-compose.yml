services:
  model:
    build:
      context: ./model
      dockerfile: DockerFile
    container_name: model
    ports:
      - "8000:8000"

  verifier:
    build:
      context: ./verifier
      dockerfile: DockerFile
    container_name: verifier
    ports:
      - "9000:9000"
    environment:
      HF_TOKEN: ${HF_TOKEN}

  worker:
    build:
      context: ./worker
      dockerfile: DockerFile
    container_name: worker
    environment:
      QUEUE_URL: ${QUEUE_URL}
      MODEL_API_URL: "http://model:8000/generate"
      VERIFIER_URL: "http://verifier:9000/verify"
      AWS_REGION: ${AWS_REGION}
      PROMPTS_TABLE: "PromptsTable"
      CHALLENGE_SESSIONS_TABLE: "ChallengeSessionsTable"
      CHALLENGES_TABLE: "ChallengesTable"
    depends_on:
      - model
      - verifier
